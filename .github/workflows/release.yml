name: Release

# Build the self-contained Windows app + Inno Setup installer and the macOS DMG.
# - Push a tag like v0.2.0  -> builds the installers AND attaches them to a GitHub Release.
# - Run manually (workflow_dispatch) -> builds the installers and uploads them as artifacts.
#
# GATES (a release can never publish an untested or mislabelled build):
#   - version-check: on a tag, the tag MUST equal the CMakeLists PROJECT_VERSION.
#   - tests: the full CI build+test matrix (Windows + macOS) must pass first.
# Both installer jobs `needs:` both gates, so a red test or a version mismatch blocks publish.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release on a tag

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag must match CMakeLists PROJECT_VERSION (tags only)
        shell: bash
        run: |
          ref="${{ github.ref }}"
          if [[ "$ref" == refs/tags/v* ]]; then
            tag="${ref#refs/tags/v}"
            proj=$(grep -oE 'project\(EarsBridge VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            echo "tag=$tag  CMakeLists=$proj"
            if [[ "$tag" != "$proj" ]]; then
              echo "::error::Release tag v$tag does not match CMakeLists project(EarsBridge VERSION $proj). Bump one to match before tagging."
              exit 1
            fi
          else
            echo "Not a tag ref (manual dispatch) - skipping the version check."
          fi

  # Reuse the exact CI build+test matrix (Windows + macOS) as the release gate.
  tests:
    uses: ./.github/workflows/ci.yml

  windows-installer:
    needs: [version-check, tests]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # Set up the MSVC toolchain regardless of which Visual Studio version the runner ships
      # (the runner image dropped VS 2022, which broke a hardcoded "Visual Studio 17 2022"
      # generator). This mirrors the local Ninja + MSVC build.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (Release, static MSVC runtime)
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build app
        run: cmake --build build --target EarsBridge

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $ver = if ($ref -like 'refs/tags/v*') { $ref.Substring('refs/tags/v'.Length) } else { '0.1.0' }
          Write-Host "Building installer version $ver"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" "installer\ears-bridge.iss"
          # Stable, version-less alias so the website's /releases/latest/download/<name> link never breaks.
          Copy-Item "dist\EARS-Bridge-$ver-Setup.exe" "dist\EARS-Bridge-Windows-Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ears-bridge-windows-installer
          path: dist/*.exe

      - name: Publish to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.exe
          generate_release_notes: true
          prerelease: true   # alpha: every build ships as a pre-release

  macos-installer:
    needs: [version-check, tests]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install create-dmg (styled disk image)
        run: brew install create-dmg

      - name: Build universal app + DMG
        shell: bash
        run: |
          ref="${{ github.ref }}"
          if [[ "$ref" == refs/tags/v* ]]; then ver="${ref#refs/tags/v}"; else ver="0.1.0"; fi
          echo "Building macOS DMG version $ver"
          chmod +x tools/build-installer-mac.sh
          tools/build-installer-mac.sh "$ver"
          # Stable, version-less alias for the website's always-latest download link.
          cp "dist/EARS-Bridge-$ver-macOS.dmg" "dist/EARS-Bridge-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ears-bridge-macos-dmg
          path: dist/*.dmg

      - name: Publish to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          generate_release_notes: true
          prerelease: true   # alpha: every build ships as a pre-release
