name: Release

# Build the self-contained Windows app and a signed-style Inno Setup installer.
# - Push a tag like v0.2.0  -> builds the installer AND attaches it to a GitHub Release.
# - Run manually (workflow_dispatch) -> builds the installer and uploads it as an artifact.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release on a tag

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # Set up the MSVC toolchain regardless of which Visual Studio version the runner ships
      # (the runner image dropped VS 2022, which broke a hardcoded "Visual Studio 17 2022"
      # generator). This mirrors the local Ninja + MSVC build.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (Release, static MSVC runtime)
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build app
        run: cmake --build build --target EarsBridge

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $ver = if ($ref -like 'refs/tags/v*') { $ref.Substring('refs/tags/v'.Length) } else { '0.1.0' }
          Write-Host "Building installer version $ver"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" "installer\ears-bridge.iss"
          # Stable, version-less alias so the website's /releases/latest/download/<name> link never breaks.
          Copy-Item "dist\EARS-Bridge-$ver-Setup.exe" "dist\EARS-Bridge-Windows-Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ears-bridge-windows-installer
          path: dist/*.exe

      - name: Publish to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.exe
          generate_release_notes: true

  macos-installer:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install create-dmg (styled disk image)
        run: brew install create-dmg

      - name: Build universal app + DMG
        shell: bash
        run: |
          ref="${{ github.ref }}"
          if [[ "$ref" == refs/tags/v* ]]; then ver="${ref#refs/tags/v}"; else ver="0.1.0"; fi
          echo "Building macOS DMG version $ver"
          chmod +x tools/build-installer-mac.sh
          tools/build-installer-mac.sh "$ver"
          # Stable, version-less alias for the website's always-latest download link.
          cp "dist/EARS-Bridge-$ver-macOS.dmg" "dist/EARS-Bridge-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ears-bridge-macos-dmg
          path: dist/*.dmg

      - name: Publish to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          generate_release_notes: true
